name: CI

on:
  push:
  pull_request:

jobs:
  lint-and-test:
    name: Lint and test (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Validate plugin manifest
        run: node -e "JSON.parse(require('fs').readFileSync('.claude-plugin/plugin.json','utf8'))"

      - name: Validate hooks declaration
        run: node -e "JSON.parse(require('fs').readFileSync('hooks/hooks.json','utf8'))"

      - name: Run tests
        run: npm test
